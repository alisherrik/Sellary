# Root config for Railway GitHub deploys (build context = repo root).
# A root Dockerfile is present, so Railway uses the Dockerfile builder and builds
# the backend from sellary-backend/. Deploy settings mirror sellary-backend/
# railway.json so push-to-main and `railway up` behave the same.
[build]
watch = ["sellary-backend/**", "Dockerfile", "railway.toml"]

[deploy]
preDeployCommand = "alembic upgrade b8c9d0e1f2a3"
# No startCommand here: with the Dockerfile builder Railway execs startCommand
# without a shell, so "$PORT" wouldn't expand. The Dockerfile CMD runs through
# `sh -c` and expands $PORT correctly.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

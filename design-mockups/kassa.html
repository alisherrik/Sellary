<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sellary — Касса</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:#eef1f6;color:#1b2330}
  .tile{transition:transform .12s ease, box-shadow .12s ease}
  .tile:active{transform:scale(.95)}
  .tile:hover{transform:translateY(-3px)}
  .cat:active{transform:scale(.94)}
  ::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:#cfd6e2;border-radius:8px}
  @keyframes fly{0%{opacity:0;transform:scale(.8)}60%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
  .fly{animation:fly .35s ease both}
  .tab{transition:all .15s}
</style>
</head>
<body>
<div class="h-screen flex">
  <!-- Catalog -->
  <main class="flex-1 min-w-0 flex flex-col">
    <header class="px-6 pt-5 pb-3 flex items-center gap-4">
      <div class="w-11 h-11 rounded-2xl grid place-items-center font-extrabold text-white text-lg shadow-lg" style="background:linear-gradient(135deg,#ff7a45,#ff4d6d)">S</div>
      <div>
        <h1 class="text-[22px] font-extrabold tracking-tight leading-none">Касса</h1>
        <p class="text-[13px] text-slate-500 mt-0.5">Алишер · Смена открыта · 09:00</p>
      </div>
      <div class="ml-auto flex-1 max-w-md relative">
        <input class="w-full h-12 pl-12 pr-4 rounded-2xl bg-white border-2 border-transparent focus:border-orange-400 outline-none text-[15px] shadow-sm" placeholder="Поиск или сканируйте штрихкод…" />
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">🔍</span>
      </div>
    </header>

    <!-- Category chips -->
    <div class="px-6 py-2 flex gap-2 overflow-x-auto whitespace-nowrap">
      <button class="cat h-11 px-5 rounded-2xl font-bold text-[14px] text-white shadow-md" style="background:#1b2330">Все 6</button>
      <button class="cat h-11 px-5 rounded-2xl font-bold text-[14px] bg-white text-sky-600 ring-2 ring-sky-100">🥤 Напитки</button>
      <button class="cat h-11 px-5 rounded-2xl font-bold text-[14px] bg-white text-amber-600 ring-2 ring-amber-100">🍿 Снеки</button>
      <button class="cat h-11 px-5 rounded-2xl font-bold text-[14px] bg-white text-emerald-600 ring-2 ring-emerald-100">🥛 Молочка</button>
      <button class="cat h-11 px-5 rounded-2xl font-bold text-[14px] bg-white text-orange-600 ring-2 ring-orange-100">🍞 Выпечка</button>
    </div>

    <!-- Tiles -->
    <div class="flex-1 overflow-y-auto px-6 py-3">
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
        <button class="tile text-left bg-white rounded-3xl p-4 shadow-sm hover:shadow-xl flex flex-col h-40 overflow-hidden relative">
          <span class="absolute top-3 right-3 text-[11px] font-bold px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700">142 шт</span>
          <div class="w-12 h-12 rounded-2xl grid place-items-center text-2xl mb-auto" style="background:#e0f2fe">🥤</div>
          <h3 class="font-bold text-[15px] leading-tight">Кока-Кола 0.5л</h3>
          <p class="text-[12px] text-sky-600 font-semibold mb-1">Напитки</p>
          <div class="text-[19px] font-extrabold">12 000 <span class="text-[12px] text-slate-400 font-bold">сум</span></div>
        </button>
        <button class="tile text-left bg-white rounded-3xl p-4 shadow-sm hover:shadow-xl flex flex-col h-40 overflow-hidden relative">
          <span class="absolute top-3 right-3 text-[11px] font-bold px-2.5 py-1 rounded-full bg-amber-100 text-amber-700">38 шт</span>
          <div class="w-12 h-12 rounded-2xl grid place-items-center text-2xl mb-auto" style="background:#fef3c7">🍿</div>
          <h3 class="font-bold text-[15px] leading-tight">Чипсы Lay's 80г</h3>
          <p class="text-[12px] text-amber-600 font-semibold mb-1">Снеки</p>
          <div class="text-[19px] font-extrabold">9 500 <span class="text-[12px] text-slate-400 font-bold">сум</span></div>
        </button>
        <button class="tile text-left bg-white rounded-3xl p-4 shadow-sm hover:shadow-xl flex flex-col h-40 overflow-hidden relative ring-2 ring-red-200">
          <span class="absolute top-3 right-3 text-[11px] font-bold px-2.5 py-1 rounded-full bg-red-100 text-red-700">⚠ 4 шт</span>
          <div class="w-12 h-12 rounded-2xl grid place-items-center text-2xl mb-auto" style="background:#e0f2fe">💧</div>
          <h3 class="font-bold text-[15px] leading-tight">Вода Чашма 1.5л</h3>
          <p class="text-[12px] text-sky-600 font-semibold mb-1">Напитки</p>
          <div class="text-[19px] font-extrabold">6 000 <span class="text-[12px] text-slate-400 font-bold">сум</span></div>
        </button>
        <button class="tile text-left bg-white rounded-3xl p-4 shadow-sm hover:shadow-xl flex flex-col h-40 overflow-hidden relative">
          <span class="absolute top-3 right-3 text-[11px] font-bold px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700">67 шт</span>
          <div class="w-12 h-12 rounded-2xl grid place-items-center text-2xl mb-auto" style="background:#dcfce7">🥛</div>
          <h3 class="font-bold text-[15px] leading-tight">Молоко Nestlé 1л</h3>
          <p class="text-[12px] text-emerald-600 font-semibold mb-1">Молочка</p>
          <div class="text-[19px] font-extrabold">14 000 <span class="text-[12px] text-slate-400 font-bold">сум</span></div>
        </button>
        <button class="tile text-left bg-white rounded-3xl p-4 shadow-sm flex flex-col h-40 overflow-hidden relative opacity-50 grayscale cursor-not-allowed">
          <span class="absolute top-3 right-3 text-[11px] font-bold px-2.5 py-1 rounded-full bg-slate-200 text-slate-500">нет</span>
          <div class="w-12 h-12 rounded-2xl grid place-items-center text-2xl mb-auto" style="background:#fef3c7">🍫</div>
          <h3 class="font-bold text-[15px] leading-tight">Шоколад Snickers</h3>
          <p class="text-[12px] text-amber-600 font-semibold mb-1">Снеки</p>
          <div class="text-[19px] font-extrabold">8 000 <span class="text-[12px] text-slate-400 font-bold">сум</span></div>
        </button>
        <button class="tile text-left bg-white rounded-3xl p-4 shadow-sm hover:shadow-xl flex flex-col h-40 overflow-hidden relative">
          <span class="absolute top-3 right-3 text-[11px] font-bold px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700">23 шт</span>
          <div class="w-12 h-12 rounded-2xl grid place-items-center text-2xl mb-auto" style="background:#ffedd5">🍞</div>
          <h3 class="font-bold text-[15px] leading-tight">Хлеб Бородинский</h3>
          <p class="text-[12px] text-orange-600 font-semibold mb-1">Выпечка</p>
          <div class="text-[19px] font-extrabold">5 500 <span class="text-[12px] text-slate-400 font-bold">сум</span></div>
        </button>
      </div>
    </div>
  </main>

  <!-- Cart / Register -->
  <aside class="w-[380px] shrink-0 bg-white border-l border-slate-100 flex flex-col shadow-2xl">
    <!-- session tabs -->
    <div class="px-3 pt-3 flex items-center gap-2 overflow-x-auto whitespace-nowrap border-b border-slate-100 pb-3">
      <button class="tab h-9 px-3 rounded-xl text-[13px] font-bold text-white shadow-sm flex items-center gap-2" style="background:#ff7a45">Чек 1 <span class="bg-white/25 rounded-full px-1.5 text-[11px]">3</span></button>
      <button class="tab h-9 px-3 rounded-xl text-[13px] font-bold text-slate-500 bg-slate-100 flex items-center gap-2">Чек 2 <span class="bg-white rounded-full px-1.5 text-[11px]">1</span></button>
      <button class="tab h-9 w-9 shrink-0 rounded-xl grid place-items-center text-white text-lg font-bold" style="background:#1b2330">＋</button>
    </div>

    <div class="px-5 pt-4 pb-2 flex items-center gap-2">
      <h2 class="text-[18px] font-extrabold">Чек #1043</h2>
      <span class="ml-auto text-[13px] text-slate-400 font-semibold">3 товара</span>
    </div>
    <div class="flex-1 overflow-y-auto px-4 space-y-2">
      <div class="fly bg-slate-50 rounded-2xl p-3 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl grid place-items-center text-xl" style="background:#e0f2fe">🥤</div>
        <div class="flex-1 min-w-0"><p class="font-bold text-[14px] truncate">Кока-Кола 0.5л</p><p class="text-[12px] text-slate-400">12 000 × 2 = 24 000</p></div>
        <div class="flex items-center gap-1.5">
          <button class="w-8 h-8 rounded-xl bg-white shadow-sm font-bold text-slate-600 text-lg">−</button>
          <span class="w-6 text-center font-extrabold">2</span>
          <button class="w-8 h-8 rounded-xl text-white font-bold text-lg" style="background:#ff7a45">+</button>
        </div>
      </div>
      <div class="fly bg-slate-50 rounded-2xl p-3 flex items-center gap-3" style="animation-delay:.06s">
        <div class="w-10 h-10 rounded-xl grid place-items-center text-xl" style="background:#fef3c7">🍿</div>
        <div class="flex-1 min-w-0"><p class="font-bold text-[14px] truncate">Чипсы Lay's 80г</p><p class="text-[12px] text-slate-400">9 500 × 1 = 9 500</p></div>
        <div class="flex items-center gap-1.5">
          <button class="w-8 h-8 rounded-xl bg-white shadow-sm font-bold text-slate-600 text-lg">−</button>
          <span class="w-6 text-center font-extrabold">1</span>
          <button class="w-8 h-8 rounded-xl text-white font-bold text-lg" style="background:#ff7a45">+</button>
        </div>
      </div>
      <div class="fly bg-slate-50 rounded-2xl p-3 flex items-center gap-3" style="animation-delay:.12s">
        <div class="w-10 h-10 rounded-xl grid place-items-center text-xl" style="background:#dcfce7">🥛</div>
        <div class="flex-1 min-w-0"><p class="font-bold text-[14px] truncate">Молоко Nestlé 1л</p><p class="text-[12px] text-slate-400">14 000 × 1 = 14 000</p></div>
        <div class="flex items-center gap-1.5">
          <button class="w-8 h-8 rounded-xl bg-white shadow-sm font-bold text-slate-600 text-lg">−</button>
          <span class="w-6 text-center font-extrabold">1</span>
          <button class="w-8 h-8 rounded-xl text-white font-bold text-lg" style="background:#ff7a45">+</button>
        </div>
      </div>
    </div>
    <div class="p-4 border-t border-slate-100">
      <div class="flex justify-between text-[13px] text-slate-500 mb-1"><span>Подытог</span><span>47 500 сум</span></div>
      <div class="flex justify-between text-[13px] text-slate-500 mb-1"><span>Налог</span><span>0 сум</span></div>
      <div class="flex justify-between items-end mb-3"><span class="font-bold">Итого</span><span class="text-[28px] font-extrabold leading-none">47 500</span></div>
      <div class="flex gap-2">
        <button class="w-14 h-14 rounded-2xl bg-slate-100 text-slate-500 font-bold text-xl active:scale-95 transition grid place-items-center" title="Очистить">🗑</button>
        <button class="flex-1 h-14 rounded-2xl text-white font-extrabold text-[17px] shadow-lg active:scale-95 transition flex items-center justify-center gap-2" style="background:linear-gradient(135deg,#22c55e,#16a34a)">Оплатить → <kbd class="text-[11px] bg-white/20 rounded px-1.5 py-0.5">Enter</kbd></button>
      </div>
    </div>
  </aside>
</div>
</body>
</html>
